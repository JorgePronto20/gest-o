<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>The Smash Burger | Sistema de Checklists</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.06);
            padding: 40px 60px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            max-width: 420px;
        }

        img.logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
        }

        p {
            margin-bottom: 30px;
            font-size: 16px;
            opacity: 0.85;
        }

        .btn {
            display: inline-block;
            padding: 14px 26px;
            background: #4f8cff;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            text-decoration: none;
            transition: 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            background: #3a6edc;
        }

        footer {
            margin-top: 25px;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" class="logo" alt="Logótipo">

        <h1>The Smash Burger</h1>
        <p>Sistema de gestão de checklists operacionais.</p>

        <!-- BOTÃO CORRIGIDO -->
        <a class="btn" href="./">Entrar no Sistema</a>

        <footer>
            © 2026 — Gestão Operacional
        </footer>
    </div>

</body>
</html>
